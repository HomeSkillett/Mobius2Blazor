<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobius — Button Gauge</title>
  <link id="mob-theme-link" rel="stylesheet" href="../styles/color-theme-tokens/LightTheme.css" />
  <link rel="stylesheet" href="../styles/css/main.css" />
  <link rel="stylesheet" href="button-gauge.css" />
  <style>
    body { margin: 0; }
    h1 { font: var(--font-hdrMd); margin: 0 0 32px; color: var(--ForegroundStrong); }
    h2 { font: var(--font-hdrSm); margin: 40px 0 16px; color: var(--ForegroundStrong); }
    h2:first-of-type { margin-top: 0; }
    .demo-list { display: flex; flex-direction: column; gap: var(--spacing-section-to-header); max-width: 540px; }
    .demo-row { display: flex; gap: 32px; align-items: flex-start; }
    .section-divider { border: none; border-top: var(--line-size) solid var(--InnerLines); margin: 32px 0 0; }
    .demo-caption { font: var(--font-bodySm); color: var(--ForegroundDisabled); margin-top: var(--spacing-label-to-control-sm); }
  </style>
</head>
<body>

<div class="mob-layout">

  <!-- Sidebar Navigation -->
  <nav class="mob-nav" id="mob-nav"></nav>

  <!-- Main Content -->
  <main class="mob-layout__content">

<h1>Button Gauge</h1>


<!-- =========================================================
     SECTION 1: BUTTON GAUGE — SMALL (DEFAULT 48px)
     Source: ButtonGauge.xaml — _primaryContainer 48px circle
     SizeState: Small
     ========================================================= -->

<h2>Small (48px, Default)</h2>

<div class="demo-list">
  <div class="demo-row">

    <!-- XAML: ButtonGauge — Normal state, 48px circle
         _primaryContainer: Background=GaugeBackgroundBrush
         _innerBorder: BorderBrush=SelectionPrimary
         _icon: Path 20x20, Fill=GaugeValueForegroundBrush -->
    <div class="mob-button-gauge">
      <button class="mob-button-gauge__button" aria-label="Power">
        <!-- XAML: _icon Path 20x20 — placeholder power icon -->
        <svg class="mob-button-gauge__icon" viewBox="0 0 20 20" aria-hidden="true">
          <path d="M10 2v8M6.5 4.5a6 6 0 1 0 7 0" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </button>
      <!-- XAML: TextBlock — Label below button -->
      <span class="mob-button-gauge__label">Power</span>
    </div>

    <!-- XAML: ButtonGauge — Normal state, different icon -->
    <div class="mob-button-gauge">
      <button class="mob-button-gauge__button" aria-label="Lock">
        <svg class="mob-button-gauge__icon" viewBox="0 0 20 20" aria-hidden="true">
          <rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M7 9V6a3 3 0 0 1 6 0v3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="mob-button-gauge__label">Lock</span>
    </div>

    <!-- XAML: ButtonGauge — Normal state, horn icon -->
    <div class="mob-button-gauge">
      <button class="mob-button-gauge__button" aria-label="Horn">
        <svg class="mob-button-gauge__icon" viewBox="0 0 20 20" aria-hidden="true">
          <path d="M3 8v4h3l4 4V4L6 8H3zM14 7a3 3 0 0 1 0 6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="mob-button-gauge__label">Horn</span>
    </div>

  </div>
  <p class="demo-caption">Small (48px) — Normal state with various icons</p>
</div>


<hr class="section-divider" />


<!-- =========================================================
     SECTION 2: BUTTON GAUGE — MEDIUM (120px)
     Source: ButtonGauge.xaml — SizeState Medium
     ========================================================= -->

<h2>Medium (120px)</h2>

<div class="demo-list">
  <div class="demo-row">

    <!-- XAML: ButtonGauge SizeState="Medium" — 120px circle -->
    <div class="mob-button-gauge mob-button-gauge--medium">
      <button class="mob-button-gauge__button" aria-label="E-Stop">
        <svg class="mob-button-gauge__icon" viewBox="0 0 20 20" aria-hidden="true">
          <path d="M10 2v8M6.5 4.5a6 6 0 1 0 7 0" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="mob-button-gauge__label">E-Stop</span>
    </div>

    <!-- XAML: ButtonGauge SizeState="Medium" — lock icon -->
    <div class="mob-button-gauge mob-button-gauge--medium">
      <button class="mob-button-gauge__button" aria-label="Engage">
        <svg class="mob-button-gauge__icon" viewBox="0 0 20 20" aria-hidden="true">
          <rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M7 9V6a3 3 0 0 1 6 0v3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="mob-button-gauge__label">Engage</span>
    </div>

  </div>
  <p class="demo-caption">Medium (120px) — SizeState="Medium", icon scales proportionally</p>
</div>


<hr class="section-divider" />


<!-- =========================================================
     SECTION 3: BUTTON GAUGE — DISABLED STATE
     Source: ButtonGauge.xaml — CommonStates > Disabled
     ========================================================= -->

<h2>Disabled State</h2>

<div class="demo-list">
  <div class="demo-row">

    <!-- XAML: ButtonGauge IsEnabled="False" — Disabled VisualState -->
    <div class="mob-button-gauge mob-button-gauge--disabled">
      <button class="mob-button-gauge__button" aria-label="Power" disabled>
        <svg class="mob-button-gauge__icon" viewBox="0 0 20 20" aria-hidden="true">
          <path d="M10 2v8M6.5 4.5a6 6 0 1 0 7 0" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="mob-button-gauge__label">Power</span>
    </div>

    <!-- XAML: ButtonGauge IsEnabled="False" SizeState="Medium" -->
    <div class="mob-button-gauge mob-button-gauge--medium mob-button-gauge--disabled">
      <button class="mob-button-gauge__button" aria-label="E-Stop" disabled>
        <svg class="mob-button-gauge__icon" viewBox="0 0 20 20" aria-hidden="true">
          <path d="M10 2v8M6.5 4.5a6 6 0 1 0 7 0" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="mob-button-gauge__label">E-Stop</span>
    </div>

  </div>
  <p class="demo-caption">Disabled — reduced opacity, no pointer events</p>
</div>


  </main>

</div>

<script src="../js/nav.js"></script>
</body>
</html>
