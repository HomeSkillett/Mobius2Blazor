<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobius — ComboBox States</title>
  <link id="mob-theme-link" rel="stylesheet" href="../styles/LightTheme.css" />
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="combobox.css" />
  <style>
    body { margin: 0; }
    h1 {
      font: var(--font-hdrMd);
      margin: 0 0 32px;
      color: var(--ForegroundStrong);
    }
    h2 {
      font: var(--font-hdrSm);
      font-weight: var(--font-light);
      color: var(--ForegroundStrong);
      margin: 40px 0 20px;
    }
    h2:first-of-type { margin-top: 0; }
    .states-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-section-to-section);
      max-width: 540px;
    }
    .section-divider {
      border: none;
      border-top: var(--line-size) solid var(--InnerLines);
      margin: 0;
    }
  </style>
</head>
<body>

<div class="mob-layout">

  <!-- Sidebar Navigation -->
  <nav class="mob-nav" id="mob-nav"></nav>

  <!-- Main Content -->
  <main class="mob-layout__content">

<h1>Mobius ComboBox</h1>

<div class="states-list">

  <!-- =============================================
       XAML source:  DatabaseExportControl.xaml > ComboBox (line 57)
       Style:        Mobius_UI_Resources_Styles_ComboBox
       Template:     Mobius_UI_Resources_Templates_ComboBox

       Uses appearance: base-select (Chrome 134+) for pixel-perfect
       dropdown styling. Falls back to appearance: none with a styled
       trigger on older browsers.

       Blazor usage:
       ┌─────────────────────────────────────────────────────────┐
       │  <div class="combobox-wrap">                            │
       │    <InputSelect class="combobox"                        │
       │                 @bind-Value="Model.OutputFormat">       │
       │      <option value="RawData">Raw data</option>          │
       │      <option value="DesignatedIntervals">               │
       │        Designated intervals</option>                    │
       │      <option value="GroupedByVehicle">                  │
       │        Grouped by vehicle</option>                      │
       │      <option value="EventsAndRoutes">                   │
       │        Events and Routes</option>                       │
       │    </InputSelect>                                       │
       │  </div>                                                 │
       │                                                         │
       │  Note: The <selectedcontent> element is HTML-only;      │
       │  Blazor's <InputSelect> does not support it yet.        │
       │  The CSS handles both cases via @supports.              │
       └─────────────────────────────────────────────────────────┘

       Browser support:
         Chrome/Edge 134+  — full dropdown + option styling
         Firefox/Safari     — styled trigger, native dropdown
       ============================================= -->


  <!-- STATE 1 — Default -->
  <h2>Default</h2>

  <!-- XAML: ComboBox > Grid (templateRoot) -->
  <div class="combobox-wrap">
    <!-- XAML: ComboBox — native <select> with appearance: base-select -->
    <!-- XAML: Arrow = Path (_toggleArrow) Icon_Arrow_PointerDownSm — via ::picker-icon -->
    <!-- XAML: ContentPresenter (ContentSite) — via <selectedcontent> -->
    <!-- XAML: PART_Popup > SubmenuBorder — via ::picker(select) -->
    <!-- XAML: ComboBoxItem — via <option> with :checked / :hover states -->
    <select class="combobox">
      <option value="RawData" selected>Raw data</option>
      <option value="DesignatedIntervals">Designated intervals</option>
      <option value="GroupedByVehicle">Grouped by vehicle</option>
      <option value="EventsAndRoutes">Events and Routes</option>
    </select>
  </div>

  <hr class="section-divider">


  <!-- STATE 2 — Disabled -->
  <h2>Disabled</h2>

  <!-- XAML: ComboBox IsEnabled="False" (HasItems trigger) -->
  <div class="combobox-wrap">
    <select class="combobox" disabled>
      <option value="RawData" selected>Raw data</option>
      <option value="DesignatedIntervals">Designated intervals</option>
      <option value="GroupedByVehicle">Grouped by vehicle</option>
      <option value="EventsAndRoutes">Events and Routes</option>
    </select>
  </div>


  <hr class="section-divider">


  <!-- STATE 3 — Horizontal Label (Left) -->
  <h2>With Label (Left)</h2>

  <!-- XAML: DatabaseExportControl.xaml — FieldLabel + ComboBox in horizontal StackPanel -->
  <div class="mob-field">
    <!-- XAML: TextBlock (field label) -->
    <label class="mob-field__label">Database output format:</label>
    <!-- XAML: ComboBox wrapped in field body -->
    <div class="mob-field__body">
      <div class="combobox-wrap">
        <select class="combobox">
          <option value="RawData" selected>Raw data</option>
          <option value="DesignatedIntervals">Designated intervals</option>
          <option value="GroupedByVehicle">Grouped by vehicle</option>
          <option value="EventsAndRoutes">Events and Routes</option>
        </select>
      </div>
    </div>
  </div>

  <hr class="section-divider">


  <!-- STATE 4 — Vertical Label (Top) -->
  <h2>With Label (Top)</h2>

  <!-- XAML: FieldLabel + ComboBox in vertical StackPanel -->
  <div class="mob-field mob-field--vertical">
    <!-- XAML: TextBlock (field label) -->
    <label class="mob-field__label">Database output format:</label>
    <!-- XAML: ComboBox wrapped in field body -->
    <div class="mob-field__body">
      <div class="combobox-wrap">
        <select class="combobox">
          <option value="RawData" selected>Raw data</option>
          <option value="DesignatedIntervals">Designated intervals</option>
          <option value="GroupedByVehicle">Grouped by vehicle</option>
          <option value="EventsAndRoutes">Events and Routes</option>
        </select>
      </div>
    </div>
  </div>


</div><!-- /.states-list -->

  </main>
</div><!-- /.mob-layout -->

<script src="../styles/nav.js"></script>
</body>
</html>
