<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobius — Outline Buttons</title>
  <link id="mob-theme-link" rel="stylesheet" href="../styles/LightTheme.css" />
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="buttons.css" />
  <style>
    body { margin: 0; }
    h1 { font: var(--font-hdrMd); margin: 0 0 32px; color: var(--ForegroundStrong); }
    .btn-grid {
      display: grid;
      grid-template-columns: 120px repeat(5, 1fr) 200px;
      gap: 0;
      border-top: var(--line-size) solid var(--InnerLines);
      border-left: var(--line-size) solid var(--InnerLines);
    }
    .btn-grid__cell {
      display: flex; align-items: center; justify-content: center;
      min-height: 72px; padding: 12px 16px;
      border-right: var(--line-size) solid var(--InnerLines);
      border-bottom: var(--line-size) solid var(--InnerLines);
    }
    .btn-grid__cell--label {
      justify-content: flex-start; background: var(--BackgroundStepOne);
      font: var(--font-Sm); font-weight: var(--font-bold); color: var(--ForegroundStrong);
    }
    .btn-grid__cell--header {
      background: var(--BackgroundStrong); font: var(--font-Sm);
      font-weight: var(--font-bold); color: var(--ForegroundStrong);
      text-transform: uppercase; min-height: 40px;
    }
    .btn-grid__cell--corner { background: var(--BackgroundStrong); min-height: 40px; }
    .btn-grid__cell--notes {
      justify-content: flex-start; font: var(--font-Sm);
      color: var(--ForegroundPrimary);
    }
    .btn-grid__cell--notes code {
      font: var(--font-Sm); font-family: var(--font-monospace); color: var(--ForegroundStrong);
    }
  </style>
</head>
<body>

<div class="mob-layout">

  <nav class="mob-nav" id="mob-nav"></nav>

  <main class="mob-layout__content">

<h1>Outline Buttons</h1>

<div class="btn-grid">

  <!-- ===== HEADER ROW ===== -->
  <div class="btn-grid__cell btn-grid__cell--corner"></div>
  <div class="btn-grid__cell btn-grid__cell--header">Normal</div>
  <div class="btn-grid__cell btn-grid__cell--header">Hover</div>
  <div class="btn-grid__cell btn-grid__cell--header">Pressed</div>
  <div class="btn-grid__cell btn-grid__cell--header">Disabled</div>
  <div class="btn-grid__cell btn-grid__cell--header">Focused</div>
  <div class="btn-grid__cell btn-grid__cell--header">Notes</div>

  <!-- ===== ROW: Outline Button ===== -->
  <!-- XAML: Mobius_UI_Resources_Styles_OutlineButton → Templates_OutlineButton -->
  <div class="btn-grid__cell btn-grid__cell--label">Outline</div>
  <div class="btn-grid__cell"><button class="mob-btn-outline">Outline</button></div>
  <div class="btn-grid__cell"><button class="is-hovered mob-btn-outline">Outline</button></div>
  <div class="btn-grid__cell"><button class="is-pressed mob-btn-outline">Outline</button></div>
  <div class="btn-grid__cell"><button class="mob-btn-outline" disabled>Outline</button></div>
  <div class="btn-grid__cell"><button class="mob-btn-outline is-focused">Outline</button></div>
  <div class="btn-grid__cell btn-grid__cell--notes"><code>.mob-btn-outline</code></div>

  <!-- ===== ROW: Outline + Icon ===== -->
  <!-- XAML: OutlineButton with Tag icon path data -->
  <div class="btn-grid__cell btn-grid__cell--label">Outline + Icon</div>
  <div class="btn-grid__cell"><button class="mob-btn-outline" data-icon="&#xE555;">Outline</button></div>
  <div class="btn-grid__cell"><button class="is-hovered mob-btn-outline" data-icon="&#xE555;">Outline</button></div>
  <div class="btn-grid__cell"><button class="is-pressed mob-btn-outline" data-icon="&#xE555;">Outline</button></div>
  <div class="btn-grid__cell"><button class="mob-btn-outline" data-icon="&#xE555;" disabled>Outline</button></div>
  <div class="btn-grid__cell"><button class="mob-btn-outline is-focused" data-icon="&#xE555;">Outline</button></div>
  <div class="btn-grid__cell btn-grid__cell--notes"><code>.mob-btn-outline</code> + <code>data-icon</code></div>

  <!-- ===== ROW: Outline Rounded ===== -->
  <!-- XAML: Mobius_UI_Resources_Styles_OutlineButtonRoundedCorners — CornerRadius=12 -->
  <div class="btn-grid__cell btn-grid__cell--label">Outline Rounded</div>
  <div class="btn-grid__cell"><button class="mob-btn-outline rounded">Rounded</button></div>
  <div class="btn-grid__cell"><button class="is-hovered mob-btn-outline rounded">Rounded</button></div>
  <div class="btn-grid__cell"><button class="is-pressed mob-btn-outline rounded">Rounded</button></div>
  <div class="btn-grid__cell"><button class="mob-btn-outline rounded" disabled>Rounded</button></div>
  <div class="btn-grid__cell"><button class="mob-btn-outline rounded is-focused">Rounded</button></div>
  <div class="btn-grid__cell btn-grid__cell--notes"><code>.mob-btn-outline.rounded</code></div>

  <!-- ===== ROW: Outline Checked ===== -->
  <!-- XAML: ToggleButton Checked — _outlineChecked border=3px, SelectionPrimary -->
  <div class="btn-grid__cell btn-grid__cell--label">Outline Checked</div>
  <div class="btn-grid__cell"><button class="mob-btn-outline is-checked">Selected</button></div>
  <div class="btn-grid__cell"><button class="is-hovered mob-btn-outline is-checked">Selected</button></div>
  <div class="btn-grid__cell"><button class="is-pressed mob-btn-outline is-checked">Selected</button></div>
  <div class="btn-grid__cell"><button class="mob-btn-outline is-checked" disabled>Selected</button></div>
  <div class="btn-grid__cell"><button class="mob-btn-outline is-checked is-focused">Selected</button></div>
  <div class="btn-grid__cell btn-grid__cell--notes"><code>.mob-btn-outline.is-checked</code></div>

</div>

  </main>

</div>

<script src="../styles/nav.js"></script>
</body>
</html>
