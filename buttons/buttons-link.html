<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobius — Link Buttons</title>
  <link id="mob-theme-link" rel="stylesheet" href="../styles/color-theme-tokens/LightTheme.css" />
  <link rel="stylesheet" href="../styles/css/main.css" />
  <link rel="stylesheet" href="buttons.css" />
  <style>
    body {
      margin: 0;
      font: var(--font-default);
      color: var(--ForegroundPrimary);
      background: var(--BackgroundPrimary);
    }
    h1 { font: var(--font-hdrMd); margin: 0 0 32px; color: var(--ForegroundStrong); }
    .btn-grid {
      display: grid;
      grid-template-columns: 120px repeat(5, 1fr) 200px;
      gap: 0;
      border-top: var(--line-size) solid var(--InnerLines);
      border-left: var(--line-size) solid var(--InnerLines);
    }
    .btn-grid__cell {
      display: flex; align-items: center; justify-content: center;
      min-height: 72px; padding: 12px 16px;
      border-right: var(--line-size) solid var(--InnerLines);
      border-bottom: var(--line-size) solid var(--InnerLines);
    }
    .btn-grid__cell--label {
      justify-content: flex-start; background: var(--BackgroundStepOne);
      font: var(--font-Sm); font-weight: var(--font-bold); color: var(--ForegroundStrong);
    }
    .btn-grid__cell--header {
      background: var(--BackgroundStrong); font: var(--font-Sm);
      font-weight: var(--font-bold); color: var(--ForegroundStrong);
      text-transform: uppercase; min-height: 40px;
    }
    .btn-grid__cell--corner { background: var(--BackgroundStrong); min-height: 40px; }
    .btn-grid__cell--notes {
      justify-content: flex-start; font: var(--font-Sm);
      color: var(--ForegroundPrimary);
    }
    .btn-grid__cell--notes code {
      font: var(--font-Sm); font-family: var(--font-monospace); color: var(--ForegroundStrong);
    }
  </style>
</head>
<body>

<div class="mob-layout">
  <nav class="mob-nav" id="mob-nav"></nav>

  <main class="mob-layout__content">
    <h1>Link Buttons</h1>

    <div class="btn-grid">

      <!-- ===== HEADER ROW ===== -->
      <div class="btn-grid__cell btn-grid__cell--corner"></div>
      <div class="btn-grid__cell btn-grid__cell--header">Normal</div>
      <div class="btn-grid__cell btn-grid__cell--header">Hover</div>
      <div class="btn-grid__cell btn-grid__cell--header">Pressed</div>
      <div class="btn-grid__cell btn-grid__cell--header">Disabled</div>
      <div class="btn-grid__cell btn-grid__cell--header">Focused</div>
      <div class="btn-grid__cell btn-grid__cell--header">Notes</div>

      <!-- ===== ROW: Link Button ===== -->
      <!-- XAML: Mobius_UI_Resources_Styles_LinkButton → Templates_LinkButton -->
      <div class="btn-grid__cell btn-grid__cell--label">Link</div>
      <div class="btn-grid__cell"><button class="mob-btn-link">Link Action</button></div>
      <div class="btn-grid__cell"><button class="is-hovered mob-btn-link">Link Action</button></div>
      <div class="btn-grid__cell"><button class="is-pressed mob-btn-link">Link Action</button></div>
      <div class="btn-grid__cell"><button class="mob-btn-link" disabled>Link Action</button></div>
      <div class="btn-grid__cell"><button class="mob-btn-link is-focused">Link Action</button></div>
      <div class="btn-grid__cell btn-grid__cell--notes"><code>.mob-btn-link</code></div>

    </div>
  </main>
</div>

<script src="../js/nav.js"></script>
</body>
</html>
