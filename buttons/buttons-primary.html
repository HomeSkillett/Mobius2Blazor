<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobius — Primary Buttons</title>
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="buttons.css" />
  <style>
    @font-face {
      font-family: "Mobius-System-Icons";
      src:
        url("../fonts/mobius-system-icons.woff2") format("woff2"),
        url("../fonts/mobius-system-icons.woff") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }
    body {
      margin: 40px;
      font: var(--font-default);
      color: var(--ForegroundPrimary);
      background: var(--BackgroundPrimary);
    }
    h1 { font: var(--font-hdrMd); margin: 0 0 32px; color: var(--ForegroundStrong); }
    .btn-grid {
      display: grid;
      grid-template-columns: 120px repeat(5, 1fr) 200px;
      gap: 0;
      border-top: var(--line-size) solid var(--InnerLines);
      border-left: var(--line-size) solid var(--InnerLines);
    }
    .btn-grid__cell {
      display: flex; align-items: center; justify-content: center;
      min-height: 72px; padding: 12px 16px;
      border-right: var(--line-size) solid var(--InnerLines);
      border-bottom: var(--line-size) solid var(--InnerLines);
    }
    .btn-grid__cell--label {
      justify-content: flex-start; background: var(--BackgroundStepOne);
      font: var(--font-Sm); font-weight: var(--font-bold); color: var(--ForegroundStrong);
    }
    .btn-grid__cell--header {
      background: var(--BackgroundStrong); font: var(--font-Sm);
      font-weight: var(--font-bold); color: var(--ForegroundStrong);
      text-transform: uppercase; min-height: 40px;
    }
    .btn-grid__cell--corner { background: var(--BackgroundStrong); min-height: 40px; }
    .btn-grid__cell--notes {
      justify-content: flex-start; font: var(--font-Sm);
      color: var(--ForegroundPrimary);
    }
    .btn-grid__cell--notes code {
      font: var(--font-Sm); font-family: var(--font-monospace); color: var(--ForegroundStrong);
    }
  </style>
</head>
<body>

<h1>Primary Buttons</h1>

<div class="btn-grid">

  <!-- ===== HEADER ROW ===== -->
  <div class="btn-grid__cell btn-grid__cell--corner"></div>
  <div class="btn-grid__cell btn-grid__cell--header">Normal</div>
  <div class="btn-grid__cell btn-grid__cell--header">Hover</div>
  <div class="btn-grid__cell btn-grid__cell--header">Pressed</div>
  <div class="btn-grid__cell btn-grid__cell--header">Disabled</div>
  <div class="btn-grid__cell btn-grid__cell--header">Focused</div>
  <div class="btn-grid__cell btn-grid__cell--header">Notes</div>

  <!-- ===== ROW: Primary Button ===== -->
  <!-- XAML: Default Button Style → Mobius_UI_Resources_Templates_Button -->
  <div class="btn-grid__cell btn-grid__cell--label">Primary</div>
  <div class="btn-grid__cell"><button class="mob-btn">Action</button></div>
  <div class="btn-grid__cell"><button class="is-hovered mob-btn">Action</button></div>
  <div class="btn-grid__cell"><button class="is-pressed mob-btn">Action</button></div>
  <div class="btn-grid__cell"><button class="mob-btn" disabled>Action</button></div>
  <div class="btn-grid__cell"><button class="mob-btn is-focused">Action</button></div>
  <div class="btn-grid__cell btn-grid__cell--notes"><code>.mob-btn</code></div>

  <!-- ===== ROW: Primary + Icon ===== -->
  <!-- XAML: Button with Tag icon glyph -->
  <div class="btn-grid__cell btn-grid__cell--label">Primary + Icon</div>
  <div class="btn-grid__cell"><button class="mob-btn" data-icon="&#xE555;">Action</button></div>
  <div class="btn-grid__cell"><button class="is-hovered mob-btn" data-icon="&#xE555;">Action</button></div>
  <div class="btn-grid__cell"><button class="is-pressed mob-btn" data-icon="&#xE555;">Action</button></div>
  <div class="btn-grid__cell"><button class="mob-btn" data-icon="&#xE555;" disabled>Action</button></div>
  <div class="btn-grid__cell"><button class="mob-btn is-focused" data-icon="&#xE555;">Action</button></div>
  <div class="btn-grid__cell btn-grid__cell--notes"><code>.mob-btn</code> + <code>data-icon</code></div>

  <!-- ===== ROW: Primary Large ===== -->
  <!-- XAML: Mobius_UI_Resources_Styles_ButtonLarge -->
  <div class="btn-grid__cell btn-grid__cell--label">Primary Large</div>
  <div class="btn-grid__cell"><button class="mob-btn lg">Action</button></div>
  <div class="btn-grid__cell"><button class="is-hovered mob-btn lg">Action</button></div>
  <div class="btn-grid__cell"><button class="is-pressed mob-btn lg">Action</button></div>
  <div class="btn-grid__cell"><button class="mob-btn lg" disabled>Action</button></div>
  <div class="btn-grid__cell"><button class="mob-btn lg is-focused">Action</button></div>
  <div class="btn-grid__cell btn-grid__cell--notes"><code>.mob-btn.lg</code></div>

  <!-- ===== ROW: Primary XL ===== -->
  <!-- XAML: Mobius_UI_Resources_Styles_ButtonXLarge -->
  <div class="btn-grid__cell btn-grid__cell--label">Primary XL</div>
  <div class="btn-grid__cell"><button class="mob-btn xl">Confirm</button></div>
  <div class="btn-grid__cell"><button class="is-hovered mob-btn xl">Confirm</button></div>
  <div class="btn-grid__cell"><button class="is-pressed mob-btn xl">Confirm</button></div>
  <div class="btn-grid__cell"><button class="mob-btn xl" disabled>Confirm</button></div>
  <div class="btn-grid__cell"><button class="mob-btn xl is-focused">Confirm</button></div>
  <div class="btn-grid__cell btn-grid__cell--notes"><code>.mob-btn.xl</code></div>

</div>

</body>
</html>
