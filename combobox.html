<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComboBox — Mobius</title>
  <link rel="stylesheet" href="styles/fontImport.css">
  <link rel="stylesheet" href="Mobius Color Tokens/LightTheme.css">
  <link rel="stylesheet" href="Mobius Color Tokens/fontTokens.css">
  <link rel="stylesheet" href="Mobius Color Tokens/spacingTokens.css">
  <link rel="stylesheet" href="styles/combobox.css">
</head>
<body style="background: var(--BackgroundPrimary); padding: 40px; font-family: var(--default-font);">


<!-- =============================================
     STATE 1 — Closed (default)
     XAML: DatabaseExportControl.xaml > ComboBox (line 57)
     Style: Mobius_UI_Resources_Styles_ComboBox
     Template: Mobius_UI_Resources_Templates_ComboBox
     ============================================= -->
<h3 style="color: var(--ForegroundStrong); font-size: var(--size-hdrSm); margin-bottom: 20px;">Closed (default)</h3>

<!-- XAML: ComboBox > Grid (templateRoot) -->
<div class="combobox" tabindex="0">
  <!-- XAML: ContentPresenter (ContentSite) — displays selected item text -->
  <span class="combobox__value">Raw data</span>
  <!-- XAML: Path (_toggleArrow) — Icon_Arrow_PointerDownSm via Mobius-System-Icons -->
  <span class="combobox__arrow" aria-hidden="true"></span>
</div>


<!-- =============================================
     STATE 2 — Open with dropdown
     XAML: ComboBox with IsDropDownOpen="True"
     Popup: PART_Popup > Grid > ScrollViewer > SubmenuBorder > StackPanel
     Items: ComboBoxItem (Mobius_UI_Resources_Templates_ComboBoxItem)
     ============================================= -->
<h3 style="color: var(--ForegroundStrong); font-size: var(--size-hdrSm); margin: 40px 0 20px;">Open (dropdown visible)</h3>

<!-- XAML: ComboBox > Grid (templateRoot) -->
<div class="combobox combobox--open" tabindex="0">
  <!-- XAML: ContentPresenter (ContentSite) -->
  <span class="combobox__value">Raw data</span>
  <!-- XAML: Path (_toggleArrow) — Icon_Arrow_PointerDownSm via Mobius-System-Icons -->
  <span class="combobox__arrow" aria-hidden="true"></span>

  <!-- XAML: Popup (PART_Popup) > Grid > ScrollViewer > Border (SubmenuBorder) > StackPanel -->
  <div class="combobox__dropdown">
    <!-- XAML: ComboBoxItem — Selected state (_selectionElement opacity 1.0) -->
    <div class="combobox__item combobox__item--selected">Raw data</div>
    <!-- XAML: ComboBoxItem — Normal state -->
    <div class="combobox__item">Designated intervals</div>
    <!-- XAML: ComboBoxItem — Normal state -->
    <div class="combobox__item">Grouped by vehicle</div>
    <!-- XAML: ComboBoxItem — Normal state -->
    <div class="combobox__item">Events and Routes</div>
  </div>
</div>


<!-- =============================================
     STATE 3 — Disabled
     XAML: ComboBox IsEnabled="False" (HasItems trigger)
     ============================================= -->
<h3 style="color: var(--ForegroundStrong); font-size: var(--size-hdrSm); margin: 40px 0 20px;">Disabled</h3>

<!-- XAML: ComboBox > Grid (templateRoot) — disabled opacity -->
<div class="combobox combobox--disabled" tabindex="-1">
  <!-- XAML: ContentPresenter (ContentSite) -->
  <span class="combobox__value">Raw data</span>
  <!-- XAML: Path (_toggleArrow) — Icon_Arrow_PointerDownSm via Mobius-System-Icons -->
  <span class="combobox__arrow" aria-hidden="true"></span>
</div>


</body>
</html>
